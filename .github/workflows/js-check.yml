name: JS Check (fast)

# ── Replaces the expensive native builds on every push ───────────────────────
# Runs on Linux in ~2 min. Catches TypeScript errors and broken imports before
# they waste a macOS build. Full native builds only run on version tags.
# Cost: ~$0.007 per run (Linux) vs ~$2.00+ per run (macOS native build).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:  # Manual only — run from GitHub Actions tab

jobs:
  js-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate env stub (needed for type-check)
        run: |
          mkdir -p src/config
          cat > src/config/env.ts <<EOF
          export const PRODUCTION_API_BASE_URL = 'https://placeholder.example.com';
          EOF

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          CI: true
