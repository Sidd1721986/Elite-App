name: iOS Build & TestFlight

# ── Cost note ────────────────────────────────────────────────────────────────
# macOS runners cost ~23× more than Linux. This workflow is intentionally
# NOT triggered on every push. Use one of these instead:
#   • workflow_dispatch (GitHub Actions tab → "Run workflow") for on-demand builds
#   • Push a version tag (e.g. git tag v1.2 && git push origin v1.2) for a release build
# A fast JS/type-check runs on every push (see js-check.yml) to catch errors cheaply.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'          # e.g. v1.0, v1.2.3 — triggers a full release build
  workflow_dispatch:  # Manual trigger from Actions tab

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci --ignore-scripts

      - name: Generate env.ts with production API URL
        run: |
          mkdir -p src/config
          cat > src/config/env.ts <<EOF
          export const PRODUCTION_API_BASE_URL = '${{ secrets.PROD_API_URL }}';
          EOF

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Import distribution certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          echo "$CERT_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k $KEYCHAIN_PATH -P "$CERT_PASSWORD" -A -t cert -f pkcs12
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Bump CFBundleVersion
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" ios/multiuserauthapp/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.${{ github.run_number }}" ios/multiuserauthapp/Info.plist

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/multiuserauthapp.xcworkspace \
            -scheme multiuserauthapp \
            -configuration Release \
            -archivePath $RUNNER_TEMP/multiuserauthapp.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            | xcpretty

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/multiuserauthapp.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            | xcpretty

      # 7-day retention — TestFlight is source of truth; no need to keep IPAs long
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 7

      # ── TestFlight upload ────────────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          if [ -z "$APPLE_API_KEY_ID" ] || [ -z "$APPLE_API_ISSUER_ID" ] || [ -z "$APPLE_API_PRIVATE_KEY" ]; then
            echo "⚠️  Apple App Store Connect API secrets not configured — skipping TestFlight upload."
            echo "    Add APPLE_API_KEY_ID, APPLE_API_ISSUER_ID, APPLE_API_PRIVATE_KEY to GitHub Secrets."
            exit 0
          fi
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          IPA_PATH=$(ls $RUNNER_TEMP/ipa/*.ipa | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID" \
            --verbose
          rm -f ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          echo "✅ Upload to TestFlight complete."
