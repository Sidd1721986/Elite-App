name: Database Backup

on:
  workflow_dispatch:  # Manual only — run from GitHub Actions tab
    inputs:
      retention_days:
        description: 'Override backup retention (days)'
        required: false
        default: '14'

env:
  # 14-day retention: recent backups stay hot, older ones move to Cool storage tier automatically.
  # Azure PostgreSQL Flexible Server also provides 7-day point-in-time restore for free,
  # so 14 days of manual backups gives full coverage with minimal storage cost.
  BACKUP_RETENTION_DAYS: ${{ github.event.inputs.retention_days || '14' }}

jobs:
  backup:
    runs-on: ubuntu-24.04
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Run pg_dump via Azure Flexible Server
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          BACKUP_FILE="eliteapp_backup_${TIMESTAMP}.sql.gz"
          pg_dump \
            --host="${{ secrets.DB_HOST }}" \
            --port=5432 \
            --username="${{ secrets.DB_USERNAME }}" \
            --dbname="${{ secrets.DB_NAME }}" \
            --no-password \
            --format=plain \
            --verbose \
            | gzip > "$BACKUP_FILE"
          echo "BACKUP_FILE=$BACKUP_FILE" >> $GITHUB_ENV
          echo "Backup size: $(du -sh $BACKUP_FILE | cut -f1)"

      - name: Upload backup to Azure Blob Storage
        run: |
          az storage blob upload \
            --account-name "${{ secrets.BACKUP_STORAGE_ACCOUNT }}" \
            --container-name "db-backups" \
            --name "$BACKUP_FILE" \
            --file "$BACKUP_FILE" \
            --auth-mode login \
            --overwrite false
          echo "Backup uploaded: $BACKUP_FILE"

      - name: Prune old backups
        run: |
          CUTOFF=$(date -u -d "-${BACKUP_RETENTION_DAYS} days" +"%Y-%m-%dT%H:%M:%SZ")
          echo "Pruning backups older than $CUTOFF"
          az storage blob list \
            --account-name "${{ secrets.BACKUP_STORAGE_ACCOUNT }}" \
            --container-name "db-backups" \
            --auth-mode login \
            --query "[?properties.lastModified < '$CUTOFF'].name" \
            --output tsv | while read blob; do
              echo "Deleting: $blob"
              az storage blob delete \
                --account-name "${{ secrets.BACKUP_STORAGE_ACCOUNT }}" \
                --container-name "db-backups" \
                --name "$blob" \
                --auth-mode login
            done

      - name: Verify backup in storage
        run: |
          az storage blob show \
            --account-name "${{ secrets.BACKUP_STORAGE_ACCOUNT }}" \
            --container-name "db-backups" \
            --name "$BACKUP_FILE" \
            --auth-mode login \
            --query "{name:name, size:properties.contentLength, modified:properties.lastModified}" \
            --output table

      # Move backups older than 7 days to Cool tier (50% cheaper) automatically.
      # Backups older than BACKUP_RETENTION_DAYS are already deleted above,
      # so only the 7-14 day window lives in Cool storage.
      - name: Set blob lifecycle policy (Cool tier after 7 days)
        continue-on-error: true
        run: |
          az storage account management-policy create \
            --account-name "${{ secrets.BACKUP_STORAGE_ACCOUNT }}" \
            --policy '{
              "rules": [{
                "name": "backup-tiering",
                "enabled": true,
                "type": "Lifecycle",
                "definition": {
                  "filters": { "blobTypes": ["blockBlob"], "prefixMatch": ["db-backups/"] },
                  "actions": {
                    "baseBlob": {
                      "tierToCool": { "daysAfterModificationGreaterThan": 7 }
                    }
                  }
                }
              }]
            }' || echo "⚠️  Lifecycle policy update skipped (may need Storage Blob Data Contributor role)"
