name: Android Build & Play Store

on:
  push:
    branches: [main, master]
    paths:
      - android/**
      - src/**
      - App.tsx
      - package.json
      - .github/workflows/android.yml
  pull_request:
    branches: [main, master]
    paths:
      - android/**
      - src/**
      - App.tsx
      - package.json
      - .github/workflows/android.yml
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install JS dependencies
        run: npm ci --ignore-scripts

      - name: Generate env.ts with production API URL
        run: |
          mkdir -p src/config
          cat > src/config/env.ts <<EOF
          export const PRODUCTION_API_BASE_URL = '${{ secrets.PROD_API_URL }}';
          EOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release AAB
        working-directory: android
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_NAME: "1.${{ github.run_number }}"
        run: ./gradlew bundleRelease --no-daemon

      # Always save the AAB as a downloadable artifact (30-day retention).
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── Play Store upload ────────────────────────────────────────────────────
      # Runs only on pushes to main (not on PRs).
      # Uploads to the "internal" testing track — safest entry point so you
      # can promote to alpha → beta → production from the Play Console manually.
      # Skips gracefully if GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is not set
      # (add it once you have your Google Play Console account).
      - name: Check Play Store secret
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: play_check
        env:
          PLAY_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_JSON" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is not configured."
            echo "    AAB is available as a workflow artifact — upload manually for now."
            echo "    Once you have your Google Play Console account, add the secret:"
            echo "      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Play Store (Internal Testing)
        if: |
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push' &&
          steps.play_check.outputs.skip == 'false'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.eliteservices.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          releaseName: "1.${{ github.run_number }}"
          mappingFile: android/app/build/outputs/mapping/release/mapping.txt
