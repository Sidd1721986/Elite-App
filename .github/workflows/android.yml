name: Android Build & Play Store

# ── Cost note ────────────────────────────────────────────────────────────────
# Full signed AAB builds are only triggered on version tags or manual dispatch.
# A fast JS/type-check runs on every push (see js-check.yml) to catch errors cheaply.
# To release: git tag v1.2 && git push origin v1.2
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:  # Manual only — run from GitHub Actions tab

jobs:
  build-android:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install JS dependencies
        run: npm ci --ignore-scripts

      - name: Generate env.ts with production API URL
        run: |
          mkdir -p src/config
          cat > src/config/env.ts <<EOF
          export const PRODUCTION_API_BASE_URL = '${{ secrets.PROD_API_URL }}';
          EOF

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build release AAB
        working-directory: android
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          VERSION_NAME: "1.${{ github.run_number }}"
        run: ./gradlew bundleRelease --no-daemon

      # 7-day retention — Play Store is source of truth; no need to keep AABs long
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      # ── Play Store upload ────────────────────────────────────────────────
      - name: Check Play Store secret
        id: play_check
        env:
          PLAY_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_JSON" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  GOOGLE_PLAY_SERVICE_ACCOUNT_JSON not configured — skipping Play Store upload."
            echo "    AAB is available as a workflow artifact — upload manually for now."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Play Store (Internal Testing)
        if: steps.play_check.outputs.skip == 'false'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.eliteservices.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          releaseName: "1.${{ github.run_number }}"
          mappingFile: android/app/build/outputs/mapping/release/mapping.txt
