# Azure DevOps pipeline for Mobile Builds + Store Deployments + Firebase Test Lab
#
# On every push to main (and manual runs) this pipeline will:
#   1) Lint + test
#   2) Build signed Android AAB (versionCode = Azure Build.BuildId so each upload is unique)
#   3) Publish that AAB to Google Play internal track — testers get the update automatically
#   4) Run a Firebase Test Lab Robo test on a virtual Pixel 6 (free tier, no charge)
#
# Testers must be on the matching track in Play Console (e.g. Internal testing → testers list / link).
# Play track is `internal` — promote to production manually in Play Console until first
# production release unlocks the API, then change track: to production below.
#
# PREREQUISITES — set these in Library → Variable Group "EliteApp-Production":
#
#  Android:
#   ENABLE_MOBILE_ANDROID        = true
#   ANDROID_KEYSTORE_BASE64      = base64-encoded elite-release.keystore
#   ANDROID_KEYSTORE_PASSWORD    = keystore password
#   ANDROID_KEY_ALIAS            = elite-alias
#   ANDROID_KEY_PASSWORD         = key password
#   GOOGLE_PLAY_SERVICE_CONN     = name of your Azure DevOps Google Play service connection
#                                  (Project Settings → Service connections → Google Play)
#   GOOGLE_PLAY_PACKAGE_NAME     = com.elitehomeservicesusa.app
#
#  Firebase Test Lab:
#   FIREBASE_PROJECT_ID          = elite-testlab-personal
#   FIREBASE_RESULTS_BUCKET      = elite-testlab-results
#   TEST_ADMIN_EMAIL             = admin email for Robo login test (secret)
#   TEST_ADMIN_PASSWORD          = admin password for Robo login test (secret)
#   Secure file: firebase-testlab-key.json  (Library → Secure files → Upload)
#                                  (firebase-testlab-ci@elite-testlab-personal.iam.gserviceaccount.com)
#
#  iOS (add once Apple Developer account is active):
#   ENABLE_MOBILE_IOS            = true
#   IOS_DISTRIBUTION_P12_SECURE_FILE    = EliteApp-Distribution.p12  (upload to Library → Secure files)
#   IOS_P12_PASSWORD             = p12 export password
#   IOS_PROVISIONING_PROFILE_SECURE_FILE = EliteApp-AppStore.mobileprovision
#   APPLE_SERVICE_CONN           = name of your Azure DevOps App Store Connect service connection
#                                  (Project Settings → Service connections → Apple App Store)
#
#  Shared:
#   PROD_API_URL                 = https://eliteapp-api-prod.azurewebsites.net/api

trigger:
  branches:
    include:
      - main
      - master

pr: none  # builds only on push to main; PR-merge refs are deleted too fast to checkout

variables:
  - group: EliteApp-Production

stages:
  - stage: LintAndTest
    displayName: Quality — Lint and Test
    jobs:
      - job: JSChecks
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: 20.x
          - task: Cache@2
            displayName: Cache node_modules
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: node_modules
          - script: npm ci --ignore-scripts --legacy-peer-deps
            displayName: npm ci
          - script: npm run lint
            displayName: eslint
          - script: npm test -- --passWithNoTests
            displayName: jest
  - stage: MobileAndroid
    displayName: Mobile — Android Play bundle (AAB)
    dependsOn: LintAndTest
    condition: |
      and(
        succeeded(),
        or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')),
        eq(variables['ENABLE_MOBILE_ANDROID'], 'true')
      )
    jobs:
      - job: AndroidPlayBundle
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_HOME_17_X64"
              echo "Java home: $JAVA_HOME_17_X64"
            displayName: Set JAVA_HOME to Java 17
          - task: NodeTool@0
            inputs:
              versionSpec: 20.x
          - task: Cache@2
            displayName: Cache node_modules
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: node_modules
          - task: Cache@2
            displayName: Cache Gradle
            inputs:
              key: 'gradle | "$(Agent.OS)" | android/build.gradle | android/app/build.gradle'
              restoreKeys: |
                gradle | "$(Agent.OS)"
              path: $(HOME)/.gradle/caches
          - script: npm ci --ignore-scripts --legacy-peer-deps
            displayName: npm ci
          - script: |
              printf 'export const PRODUCTION_API_BASE_URL = "%s";\n' "$(PROD_API_URL)" > src/config/env.ts
              printf 'export const SENTRY_DSN = "%s";\n' "$(SENTRY_DSN)" >> src/config/env.ts
            displayName: Inject production API URL and Sentry DSN
          - script: |
              set -e
              printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$AGENT_TEMPDIRECTORY/elite-release.keystore"
              printf 'storeFile=%s\n' "$AGENT_TEMPDIRECTORY/elite-release.keystore" > android/keystore.properties
              printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD" >> android/keystore.properties
              printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS" >> android/keystore.properties
              printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD" >> android/keystore.properties
            displayName: Decode keystore and write android/keystore.properties
            env:
              ANDROID_KEYSTORE_BASE64: $(ANDROID_KEYSTORE_BASE64)
              ANDROID_KEYSTORE_PASSWORD: $(ANDROID_KEYSTORE_PASSWORD)
              ANDROID_KEY_ALIAS: $(ANDROID_KEY_ALIAS)
              ANDROID_KEY_PASSWORD: $(ANDROID_KEY_PASSWORD)
          - script: chmod +x android/gradlew
            displayName: chmod gradlew
          - script: cd android && ./gradlew bundleRelease --no-daemon --stacktrace --no-build-cache
            displayName: bundleRelease
            env:
              BUILD_BUILDID: $(Build.BuildId)
              VERSION_NAME: $(Build.BuildNumber)
          - script: |
              set -e
              NOTES="$(Build.ArtifactStagingDirectory)/play-release-notes.txt"
              {
                echo "Build $(Build.BuildNumber) ($(Build.DefinitionName))"
                echo "Commit: $(Build.SourceVersion)"
              } > "$NOTES"
              echo "##vso[task.setvariable variable=PLAY_RELEASE_NOTES_FILE]$NOTES"
            displayName: Write Play Store release notes (en-US)
          - task: PublishBuildArtifacts@1
            displayName: Publish AAB artifact
            inputs:
              pathToPublish: android/app/build/outputs/bundle/release/app-release.aab
              artifactName: android-aab
          - task: GooglePlayRelease@4
            displayName: Publish AAB to Google Play (internal)
            inputs:
              serviceConnection: $(GOOGLE_PLAY_SERVICE_CONN)
              applicationId: $(GOOGLE_PLAY_PACKAGE_NAME)
              action: SingleBundle
              bundleFile: android/app/build/outputs/bundle/release/app-release.aab
              track: internal
              isDraftRelease: false
              releaseName: '$(Build.BuildNumber)'
              changeLogFile: $(PLAY_RELEASE_NOTES_FILE)
              languageCode: en-US

  - stage: DetoxE2E
    displayName: Detox E2E — Admin / Vendor / User login flows
    dependsOn: LintAndTest
    condition: |
      and(
        succeeded(),
        or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')),
        eq(variables['ENABLE_MOBILE_ANDROID'], 'true')
      )
    jobs:
      - job: DetoxTests
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: 20.x
          - task: Cache@2
            displayName: Cache node_modules
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: node_modules
          - script: npm ci --ignore-scripts --legacy-peer-deps
            displayName: npm ci
          - script: |
              set -e
              echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_HOME_17_X64"
              # Install Android SDK build tools
              ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
              echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $AGENT_TOOLSDIRECTORY/../_temp/env.txt || true
              $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install \
                "system-images;android-31;google_apis;x86_64" \
                "platforms;android-31" \
                "build-tools;31.0.0" \
                "emulator" 2>&1 | grep -v "^\[=" | tail -10
            displayName: Install Android emulator image (API 31)
          - script: |
              set -e
              ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
              echo "no" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager create avd \
                --name Pixel_6_API_31 \
                --package "system-images;android-31;google_apis;x86_64" \
                --device "pixel_6" --force
              echo "AVD created"
            displayName: Create AVD (Pixel 6 API 31)
          - script: |
              set -e
              ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
              # Start emulator in background
              nohup $ANDROID_SDK_ROOT/emulator/emulator \
                -avd Pixel_6_API_31 -no-audio -no-window -gpu swiftshader_indirect \
                -no-snapshot -wipe-data &
              # Wait for boot
              $ANDROID_SDK_ROOT/platform-tools/adb wait-for-device
              echo "Waiting for emulator boot..."
              until $ANDROID_SDK_ROOT/platform-tools/adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; do
                sleep 5
              done
              echo "Emulator booted"
              # Disable animations for reliable testing
              $ANDROID_SDK_ROOT/platform-tools/adb shell settings put global window_animation_scale 0
              $ANDROID_SDK_ROOT/platform-tools/adb shell settings put global transition_animation_scale 0
              $ANDROID_SDK_ROOT/platform-tools/adb shell settings put global animator_duration_scale 0
            displayName: Start emulator and disable animations
          - script: |
              set -e
              echo "##vso[task.setvariable variable=JAVA_HOME]$JAVA_HOME_17_X64"
              cd android && ./gradlew assembleDebug assembleDebugAndroidTest \
                -DtestBuildType=debug --no-daemon --stacktrace 2>&1 | tail -20
            displayName: Build debug APK + test APK
            env:
              BUILD_BUILDID: $(Build.BuildId)
              VERSION_NAME: $(Build.BuildNumber)
          - script: |
              set -e
              npx detox test \
                --configuration android.emu.debug \
                --headless \
                --record-logs all \
                --take-screenshots failing \
                --jest-report-specs
            displayName: Run Detox E2E tests
            env:
              TEST_ADMIN_EMAIL: $(TEST_ADMIN_EMAIL)
              TEST_ADMIN_PASSWORD: $(TEST_ADMIN_PASSWORD)
              TEST_VENDOR_EMAIL: $(TEST_VENDOR_EMAIL)
              TEST_VENDOR_PASSWORD: $(TEST_VENDOR_PASSWORD)
              TEST_USER_EMAIL: $(TEST_USER_EMAIL)
              TEST_USER_PASSWORD: $(TEST_USER_PASSWORD)
          - task: PublishTestResults@2
            displayName: Publish Detox test results
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: 'e2e/artifacts/**/*.xml'
              failTaskOnFailedTests: true
          - task: PublishBuildArtifacts@1
            displayName: Publish Detox screenshots (on failure)
            condition: failed()
            inputs:
              pathToPublish: e2e/artifacts
              artifactName: detox-artifacts

  - stage: FirebaseTestLab
    displayName: Firebase Test Lab — Robo test (virtual Pixel 6)
    dependsOn: MobileAndroid
    condition: |
      and(
        succeeded(),
        or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')),
        eq(variables['ENABLE_MOBILE_ANDROID'], 'true')
      )
    jobs:
      - job: RoboTest
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: DownloadBuildArtifacts@1
            displayName: Download AAB artifact
            inputs:
              buildType: current
              artifactName: android-aab
              downloadPath: $(Pipeline.Workspace)
          - script: |
              set -e
              curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
              echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list
              sudo apt-get update -qq && sudo apt-get install -y -qq google-cloud-cli
              gcloud --version
            displayName: Install gcloud CLI
          - task: DownloadSecureFile@1
            displayName: Download Firebase service account key
            name: ftlKey
            inputs:
              secureFile: firebase-testlab-key.json
          - script: |
              set -e
              gcloud auth activate-service-account --key-file="$(ftlKey.secureFilePath)"
              gcloud config set project "$(FIREBASE_PROJECT_ID)"
            displayName: Authenticate gcloud
          - script: |
              set -e
              # Inject real admin credentials into the Robo script
              sed \
                -e "s|PLACEHOLDER_EMAIL|$TEST_ADMIN_EMAIL|g" \
                -e "s|PLACEHOLDER_PASSWORD|$TEST_ADMIN_PASSWORD|g" \
                e2e/robo-admin-login.json > /tmp/robo-script.json
              echo "Robo script ready (credentials injected)"

              AAB_PATH="$(Pipeline.Workspace)/android-aab/app-release.aab"
              echo "Submitting Robo test with admin login: $AAB_PATH"
              gcloud firebase test android run \
                --type=robo \
                --app="$AAB_PATH" \
                --device model=oriole,version=31,locale=en,orientation=portrait \
                --timeout=5m \
                --robo-script=/tmp/robo-script.json \
                --results-bucket="$FIREBASE_RESULTS_BUCKET" \
                --results-dir="$(Build.BuildNumber)" \
                --project="$FIREBASE_PROJECT_ID"
              echo "Results: https://console.firebase.google.com/project/$FIREBASE_PROJECT_ID/testlab/histories/"
            displayName: Run Firebase Robo test — admin login + crawl
            env:
              FIREBASE_PROJECT_ID: $(FIREBASE_PROJECT_ID)
              FIREBASE_RESULTS_BUCKET: $(FIREBASE_RESULTS_BUCKET)
              TEST_ADMIN_EMAIL: $(TEST_ADMIN_EMAIL)
              TEST_ADMIN_PASSWORD: $(TEST_ADMIN_PASSWORD)

# iOS stage — add back once Apple Developer account is active and certificates are uploaded.
# Required extensions: https://marketplace.visualstudio.com/items?itemName=ms-vsclient.app-store
