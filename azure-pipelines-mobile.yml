# Azure DevOps pipeline for Mobile Builds (Android AAB and iOS IPA)
#
# Use this when you are ready to build for the stores.
# PREREQUISITE:
#  1) Upload your Android keystore and iOS certificates to "Library -> Secure files"
#  2) Set ENABLE_MOBILE_ANDROID and ENABLE_MOBILE_IOS to true in the "EliteApp-Production" Variable Group.
#  3) Ensure ANDROID_KEYSTORE_SECURE_FILE, IOS_DISTRIBUTION_P12_SECURE_FILE, etc. are set.
#  4) Set PROD_API_URL in the variable group (e.g. https://eliteapp-api-prod.azurewebsites.net/api)
#     This is injected into src/config/env.ts before each native build — never commit env.ts.

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

variables:
  - group: EliteApp-Production

stages:
  - stage: LintAndTest
    displayName: Quality — Lint and Test
    jobs:
      - job: JSChecks
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: 20.x
          - task: Cache@2
            displayName: Cache node_modules
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: node_modules
          - script: npm ci --ignore-scripts
            displayName: npm ci
          - script: npm run lint
            displayName: eslint
          - script: npm test -- --passWithNoTests
            displayName: jest
  - stage: MobileAndroid
    displayName: Mobile — Android Play bundle (AAB)
    dependsOn: LintAndTest
    condition: |
      and(
        succeeded(),
        or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')),
        eq(variables['ENABLE_MOBILE_ANDROID'], 'true')
      )
    jobs:
      - job: AndroidPlayBundle
        pool:
          vmImage: ubuntu-latest
        variables:
          JAVA_HOME: $(JAVA_HOME_17_X64)
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: 20.x
          - task: Cache@2
            displayName: Cache node_modules
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: node_modules
          - task: Cache@2
            displayName: Cache Gradle
            inputs:
              key: 'gradle | "$(Agent.OS)"'
              restoreKeys: |
                gradle | "$(Agent.OS)"
              path: $(HOME)/.gradle/caches
          - script: npm ci --ignore-scripts
            displayName: npm ci
          - script: |
              echo "export const PRODUCTION_API_BASE_URL = '$(PROD_API_URL)';" > src/config/env.ts
            displayName: Inject production API URL
          - script: |
              set -e
              echo "$(ANDROID_KEYSTORE_BASE64)" | base64 --decode > $(Agent.TempDirectory)/elite-release.keystore
              printf '%s\n' "storeFile=$(Agent.TempDirectory)/elite-release.keystore" > android/keystore.properties
              printf '%s\n' "storePassword=$(ANDROID_KEYSTORE_PASSWORD)" >> android/keystore.properties
              printf '%s\n' "keyAlias=$(ANDROID_KEY_ALIAS)" >> android/keystore.properties
              printf '%s\n' "keyPassword=$(ANDROID_KEY_PASSWORD)" >> android/keystore.properties
            displayName: Decode keystore and write android/keystore.properties
            env:
              ANDROID_KEYSTORE_BASE64: $(ANDROID_KEYSTORE_BASE64)
              ANDROID_KEYSTORE_PASSWORD: $(ANDROID_KEYSTORE_PASSWORD)
              ANDROID_KEY_ALIAS: $(ANDROID_KEY_ALIAS)
              ANDROID_KEY_PASSWORD: $(ANDROID_KEY_PASSWORD)
          - script: chmod +x android/gradlew
            displayName: chmod gradlew
          - script: cd android && ./gradlew bundleRelease --no-daemon --stacktrace
            displayName: bundleRelease
          - task: PublishBuildArtifacts@1
            displayName: Publish AAB
            inputs:
              pathToPublish: android/app/build/outputs/bundle/release/app-release.aab
              artifactName: android-aab

# iOS stage removed — add back when Apple Distribution certificate and
# provisioning profile are uploaded to Library → Secure files and
# ENABLE_MOBILE_IOS is set to true in the EliteApp-Production variable group.
