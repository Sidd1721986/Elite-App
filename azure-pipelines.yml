# Azure DevOps pipeline: build API Docker image → push to Azure Container Registry → deploy to Azure App Service (Linux, container).
#
# Cost-conscious defaults (no new Azure services):
#   - One build agent runs tests + Docker (avoids a second fresh VM per commit).
#   - Path filters: only backend/** and this file trigger CI (mobile-only commits skip API pipeline minutes).
#   - NuGet packages.lock.json + --locked-mode: reproducible restores and better cache hits.
#   - Post-deploy health uses polling instead of a fixed 20 s sleep.
#
# Optional App Service setting (no extra cost) when scaling to multiple instances:
#   Database__RunMigrations = false
#   Then apply migrations once per release (e.g. `dotnet ef database update` from a release job with DB access).
#
# Prerequisites (you create these in Azure / Azure DevOps — do not commit secrets):
#  1) Resource group + Azure Container Registry (ACR)
#  2) Linux App Service plan + Web App for Containers
#  3) App Service → Configuration:
#       - WEBSITES_PORT = 5260  (Kestrel listens on 5260 in Program.cs)
#       - ASPNETCORE_ENVIRONMENT = Production
#       - Always On = On (recommended)
#  4) App Service application settings (use Key Vault references in production). Same names as appsettings.Production.json.example:
#       - ConnectionStrings__DefaultConnection
#       - Jwt__Key  (min 32 characters; validated at startup in Production)
#       - PasswordReset__Pepper  (strong secret; not placeholder text)
#       - Cors__AllowedOrigins  (semicolon-separated HTTPS origins)
#       - Email__Smtp__* / Email__FromAddress  (optional; without SMTP, password reset may 503)
#       - Sms__Twilio__AccountSid              (Twilio Account SID for OTP SMS delivery)
#       - Sms__Twilio__AuthToken               (Twilio Auth Token — mark as secret)
#       - Bootstrap__AdminPassword             (optional one-time; only if no admin exists)
#       - APPLICATIONINSIGHTS_CONNECTION_STRING (Azure Monitor / App Insights — get from portal: eliteapp-ai-prod → Properties)
#  5) Azure DevOps service connections:
#       - Docker Registry → your ACR
#       - Azure Resource Manager → subscription (for deploy task)
#
# Local prod-like container: docker-compose.prod.yml + copy .env.prod.example → .env.prod
#
# Create a Variable Group "EliteApp-Production" (or rename below) with:
#   GHCR_USERNAME        = your GitHub username (lowercase), e.g. siddharthsengar
#   GHCR_TOKEN           = GitHub PAT with write:packages + read:packages scope  (mark as secret)
#   webAppName           = your Azure App Service name
#   azureSubscription    = the NAME of your Azure Resource Manager service connection
#
# Link the variable group to this pipeline in Azure DevOps: Edit pipeline → Variables → Variable groups.
#
# --- Mobile store builds (optional; set ENABLE_MOBILE_ANDROID / ENABLE_MOBILE_IOS to true when ready) ---
# Library → Secure files (exact names must match the variable values below):
#   - Upload your Android upload keystore (e.g. elite-android-release.jks)
#   - Apple Distribution .p12 (e.g. ios-distribution.p12)
#   - App Store provisioning profile .mobileprovision (e.g. Elite_AppStore.mobileprovision)
#
# Variable group secrets (mark as secret in DevOps):
#   ANDROID_KEYSTORE_SECURE_FILE     = filename as stored in Secure files, e.g. elite-android-release.jks
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
#   IOS_DISTRIBUTION_P12_SECURE_FILE = e.g. ios-distribution.p12
#   IOS_DISTRIBUTION_CERT_PASSWORD   = .p12 password
#   IOS_PROVISION_PROFILE_SECURE_FILE= e.g. Elite_AppStore.mobileprovision
#   APPLE_TEAM_ID                    = 10-character Apple Developer Team ID
#   IOS_PROVISIONING_PROFILE_SPECIFIER = profile *name* as shown in Apple Developer (Xcode target → Signing)
#
# Artifacts:
#   - android-aab: app-release.aab → Google Play Console (Production or internal testing track)
#   - ios-ipa:     .ipa → Transporter or `xcrun altool` / App Store Connect API
#
# Enable mobile jobs by defining in the variable group:
#   ENABLE_MOBILE_ANDROID = true
#   ENABLE_MOBILE_IOS     = true
#
# IMPORTANT: If your backend crashes on startup in production, check App Service Logs for
# missing environment variables (ConnectionStrings__DefaultConnection, Jwt__Key, AllowedHosts).

trigger:
  branches:
    include:
      - main
      - master
  paths:
    include:
      - backend/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main
      - master
  paths:
    include:
      - backend/**
      - azure-pipelines.yml

variables:
  - group: EliteApp-Production
  # Variable group must contain (mark GHCR_TOKEN as secret):
  #   GHCR_USERNAME       = your GitHub username (lowercase)
  #   GHCR_TOKEN          = GitHub PAT with write:packages scope
  #   webAppName          = Azure App Service name
  #   azureSubscription   = Azure Resource Manager service connection name
  #   APPLICATIONINSIGHTS_CONNECTION_STRING  (optional, from App Insights portal)
  - name: dockerfilePath
    value: backend/Dockerfile
  - name: buildContext
    value: backend

stages:
  - stage: BuildAndPush
    displayName: Build image and push to GHCR
    jobs:
      - job: BuildTestAndPush
        displayName: Test, build Docker image, push to GHCR
        timeoutInMinutes: 30
        pool:
          vmImage: ubuntu-24.04
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: 'sdk'
              version: '10.x'
          - task: Cache@2
            displayName: Cache NuGet packages
            inputs:
              key: 'nuget | "$(Agent.OS)" | backend/EliteApp.API.csproj'
              restoreKeys: |
                nuget | "$(Agent.OS)"
              path: $(HOME)/.nuget/packages
          - script: dotnet restore backend/EliteApp.API.csproj
            displayName: Restore dependencies
          - script: |
              # Run tests only if a test project exists alongside the API project.
              TEST_PROJ=$(find backend -name "*.Tests.csproj" -o -name "*Tests.csproj" | head -1)
              if [ -n "$TEST_PROJ" ]; then
                dotnet test "$TEST_PROJ" --configuration Release --no-restore \
                  --logger "trx;LogFileName=testresults.trx"
              else
                echo "No test project found — skipping test run."
              fi
            displayName: Execute tests (if present)
          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**/testresults.trx'
          - script: |
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
              IMAGE=ghcr.io/$(GHCR_USERNAME)/eliteapp-api
              docker build -f $(dockerfilePath) $(buildContext) \
                -t $IMAGE:$(Build.BuildId) \
                -t $IMAGE:latest
              docker push $IMAGE:$(Build.BuildId)
              docker push $IMAGE:latest
              echo "##vso[task.setvariable variable=DOCKER_IMAGE;isOutput=true]$IMAGE:$(Build.BuildId)"
            displayName: Build and push to GitHub Container Registry
            env:
              GHCR_TOKEN: $(GHCR_TOKEN)
              GHCR_USERNAME: $(GHCR_USERNAME)
            name: dockerBuild

  - stage: Deploy
    displayName: Deploy to Azure App Service
    dependsOn: BuildAndPush
    # Only deploy from main/master — PRs must NOT trigger production deployments.
    condition: |
      and(
        succeeded(),
        or(
          eq(variables['Build.SourceBranch'], 'refs/heads/main'),
          eq(variables['Build.SourceBranch'], 'refs/heads/master')
        )
      )
    jobs:
      - job: DeployWeb
        timeoutInMinutes: 20
        pool:
          vmImage: ubuntu-24.04
        steps:
          - task: AzureAppServiceSettings@1
            displayName: Configure GHCR credentials and App Insights
            inputs:
              azureSubscription: $(azureSubscription)
              appName: $(webAppName)
              appSettings: |
                [
                  {
                    "name": "DOCKER_REGISTRY_SERVER_URL",
                    "value": "https://ghcr.io",
                    "slotSetting": false
                  },
                  {
                    "name": "DOCKER_REGISTRY_SERVER_USERNAME",
                    "value": "$(GHCR_USERNAME)",
                    "slotSetting": false
                  },
                  {
                    "name": "DOCKER_REGISTRY_SERVER_PASSWORD",
                    "value": "$(GHCR_TOKEN)",
                    "slotSetting": false
                  },
                  {
                    "name": "APPLICATIONINSIGHTS_CONNECTION_STRING",
                    "value": "$(APPLICATIONINSIGHTS_CONNECTION_STRING)",
                    "slotSetting": false
                  },
                  {
                    "name": "ApplicationInsightsAgent_EXTENSION_VERSION",
                    "value": "~3",
                    "slotSetting": false
                  }
                ]

          - task: AzureWebAppContainer@1
            displayName: Deploy container from GitHub Container Registry
            inputs:
              azureSubscription: $(azureSubscription)
              appName: $(webAppName)
              containers: ghcr.io/$(GHCR_USERNAME)/eliteapp-api:$(Build.BuildId)

          - script: |
              set -e
              URL="https://$(webAppName).azurewebsites.net/health"
              echo "Polling $URL for readiness..."
              for i in $(seq 1 36); do
                STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "$URL" || echo "000")
                echo "Attempt $i: HTTP $STATUS"
                if [ "$STATUS" = "200" ]; then
                  echo "Health check OK"
                  exit 0
                fi
                sleep 5
              done
              echo "Health check failed after waiting for ready state"
              exit 1
            displayName: Post-deploy health check
            retryCountOnTaskFailure: 3
